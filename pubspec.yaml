name: campusmate
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  flutter_riverpod: ^3.0.3
  firebase_storage: ^13.0.4
  permission_handler: ^12.0.1
  go_router: ^16.3.0
  image_picker: ^1.2.0
  lottie: ^3.3.2
  font_awesome_flutter: ^10.12.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  logger: ^2.6.2
  flutter_secure_storage: ^9.2.4
  queue: ^3.4.0
  kalender: ^0.14.2
  http: ^1.2.2

  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/
    # Note: assets/data/ was removed because the directory or files were not
    # present in the repository. Add it back here only after creating
    # `assets/data/` and placing files inside.

  # If you intend to use a custom font, re-add the `fonts:` section and
  # point to the actual font files inside `assets/fonts/`. For example:
  # fonts:
  #   - family: MyCustomFont
  #     fonts:
  #       - asset: assets/fonts/MyCustomFont-Regular.ttf
