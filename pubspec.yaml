name: campusmate
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    # Note: assets/data/ was removed because the directory or files were not
    # present in the repository. Add it back here only after creating
    # `assets/data/` and placing files inside.

  # If you intend to use a custom font, re-add the `fonts:` section and
  # point to the actual font files inside `assets/fonts/`. For example:
  # fonts:
  #   - family: MyCustomFont
  #     fonts:
  #       - asset: assets/fonts/MyCustomFont-Regular.ttf